# wiriri-prod-api-01 redis.conf — CURRENT live (captured 2026-06-26).
# Drift vs runbook: live has `bind 0.0.0.0` + `protected-mode no` (runbook said
# 127.0.0.1 / yes). Mitigated because the port is published only on 127.0.0.1:6379,
# so Redis is NOT VPC-reachable — but tighten to match the runbook when convenient.
bind 0.0.0.0
protected-mode no

port 6379

appendonly yes
appendfsync everysec

maxmemory 512mb
maxmemory-policy noeviction

save 900 1
save 300 10
save 60 10000
