# =============================================================================
# cdn.wiriri.com — image CDN (imgproxy) + presigned S3 passthrough
# Drop-in replacement for the current (stub) cdn server block in web-01's
# /opt/wiriri/nginx/default.conf. TLS uses the existing wiriri.com SAN cert
# (already covers cdn.wiriri.com). Certbot = webroot; the :80 ACME block stays.
#
# REQUIRES (one-time):
#   1) imgproxy running on storage-01 at 10.130.18.7:8080  (see ../storage-01/)
#   2) firewall: allow web-01 (10.130.18.3) -> storage-01 :8080   (:9000 already open)
#   3) the cache zone below declared at http{} scope (top of default.conf)
#   4) nginx compose mounts a cache dir:  ./nginx/cache:/var/cache/nginx
# =============================================================================

# --- declare ONCE at http{} scope (put at the very top of default.conf) -------
# proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:10m
#                  max_size=5g inactive=30d use_temp_path=off;
# ------------------------------------------------------------------------------

server {
    listen 443 ssl;
    server_name cdn.wiriri.com;

    ssl_certificate     /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;

    # Uploads stream straight through. 12m = a little above our 10MB ID/KYC cap
    # (public images are capped at 5MB by the presign policy anyway).
    client_max_body_size 12m;

    # ---------------------------------------------------------------------------
    # 1) Transformed PUBLIC images via imgproxy (HMAC-signed URLs), edge-cached.
    #    e.g.  https://cdn.wiriri.com/img/<sig>/rs:fill:1200:800/q:80/<src>
    #    imgproxy fetches the original from MinIO (s3://wiriri-prod-images) itself.
    # ---------------------------------------------------------------------------
    location /img/ {
        proxy_pass http://10.130.18.7:8080/;     # trailing slash strips the /img/ prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache            cdn_cache;
        proxy_cache_key        $request_uri;     # signed URL fully determines the bytes
        proxy_cache_valid      200 30d;
        proxy_cache_use_stale  error timeout updating;
        proxy_cache_lock       on;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control  "public, max-age=31536000, immutable" always;
    }

    # ---------------------------------------------------------------------------
    # 2) Presigned S3 passthrough (browser PUT uploads + GET downloads).
    #    MinIO validates the SigV4 signature -> unsigned requests get 403.
    #    Host MUST be forwarded as cdn.wiriri.com (NOT the MinIO IP) because the
    #    backend signs presigned URLs against the public host. Only the two
    #    buckets are routable; identity-documents are NEVER presigned to here.
    # ---------------------------------------------------------------------------
    location ~ ^/(wiriri-prod-images|wiriri-prod-private)/ {
        proxy_pass http://10.130.18.7:9000;      # no rewrite — keep /<bucket>/<key>?<sig>
        proxy_http_version 1.1;
        proxy_set_header Host $host;             # cdn.wiriri.com — matches the signature
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_request_buffering off;             # stream large PUTs
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
    }

    # Nothing else on cdn is public.
    location / { return 404; }
}
