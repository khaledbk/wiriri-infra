# wiriri edge nginx main config. Custom (vs the stock image default) ONLY to:
#   1) load the compiled geoip2 dynamic module (main context — cannot live in conf.d), and
#   2) declare the geoip2 lookup + the EEA/UK country map in the http context.
# Everything else mirrors the official nginx.conf defaults. The per-vhost server
# blocks stay in conf.d/default.conf.

load_module modules/ngx_http_geoip2_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" geo=$geoip2_country_iso_code';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # --- GeoIP2 (DB-IP IP-to-Country Lite, CC BY 4.0 — "IP Geolocation by DB-IP") ---
    # web-01 is the public edge, so $remote_addr is the real client IP.
    geoip2 /etc/nginx/geoip/dbip-country-lite.mmdb {
        auto_reload 60m;                 # hot-reload when refresh-geoip.sh swaps the file
        $geoip2_country_iso_code source=$remote_addr country iso_code;
    }

    # EEA decision. $is_eea == 1 means "consent required" (deny GA until opt-in):
    # EU-27 + EEA (IS, LI, NO) + UK, AND unknown/empty (privacy-safe). Any
    # confirmed non-EEA country falls through default -> 0 (auto-grant allowed).
    map $geoip2_country_iso_code $is_eea {
        default                  0;
        ""                       1;
        AT 1; BE 1; BG 1; HR 1; CY 1; CZ 1; DK 1; EE 1; FI 1; FR 1;
        DE 1; GR 1; HU 1; IE 1; IT 1; LV 1; LT 1; LU 1; MT 1; NL 1;
        PL 1; PT 1; RO 1; SK 1; SI 1; ES 1; SE 1;
        IS 1; LI 1; NO 1; GB 1;
    }

    include /etc/nginx/conf.d/*.conf;
}
