# wiriri-prod-web-01 — LIVE nginx (/opt/wiriri/nginx/default.conf), updated 2026-06-26.
# cdn.wiriri.com vhost is ACTIVE: /img/* -> imgproxy (edge-cached), presigned passthrough -> MinIO.
# Validated 2026-06-26: cdn /img 200 + X-Cache MISS->HIT, unsigned 403, other sites unaffected.
# Backup of the previous (stub) config kept on-box as default.conf.bak-<ts>.
# NOTE: proxy_cache lives in-container at /var/cache/nginx/cdn (ephemeral; re-warms on
#       container recreate). Add a host mount ./nginx/cache:/var/cache/nginx if persistence is wanted.

proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:10m max_size=5g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name wiriri.com www.wiriri.com api.wiriri.com admin.wiriri.com cdn.wiriri.com;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name www.wiriri.com;
    ssl_certificate /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;
    return 301 https://wiriri.com$request_uri;
}

server {
    listen 443 ssl;
    server_name wiriri.com;
    ssl_certificate /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;
    client_max_body_size 50m;
    location / {
        proxy_pass http://webapp:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name api.wiriri.com;
    ssl_certificate /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;
    client_max_body_size 50m;
    location / {
        proxy_pass http://10.130.18.4:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name admin.wiriri.com;
    ssl_certificate /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;
    client_max_body_size 50m;
    location / {
        proxy_pass http://admin:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
