# CURRENT cdn stub (non-working: bucket is private + Host overridden to MinIO IP).
server {
    listen 443 ssl;
    server_name cdn.wiriri.com;
    ssl_certificate /etc/letsencrypt/live/wiriri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiriri.com/privkey.pem;
    client_max_body_size 50m;
    location / {
        proxy_pass http://10.130.18.7:9000/wiriri-prod-images/;
        proxy_http_version 1.1;
        proxy_set_header Host 10.130.18.7:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
